apiVersion: v1
kind: ServiceAccount
metadata:
  name: backup-sa
  namespace: devops
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: backup-role
  namespace: devops
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    resourceNames: ["gcs-credentials"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: backup-rolebinding
  namespace: devops
subjects:
  - kind: ServiceAccount
    name: backup-sa
    namespace: devops
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: backup-role
