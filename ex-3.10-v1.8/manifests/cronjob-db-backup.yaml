apiVersion: batch/v1
kind: CronJob
metadata:
  name: postgres-backup
  namespace: devops
spec:
  # Run daily at 2 AM UTC
  schedule: "0 2 * * *"
  jobTemplate:
    spec:
      backoffLimit: 3
      template:
        spec:
          serviceAccountName: backup-sa
          containers:
            - name: postgres-backup
              image: google/cloud-sdk:alpine
              env:
                - name: POSTGRES_USER
                  valueFrom:
                    secretKeyRef:
                      name: postgres-secret
                      key: POSTGRES_USER
                - name: POSTGRES_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: postgres-secret
                      key: POSTGRES_PASSWORD
                - name: POSTGRES_DB
                  valueFrom:
                    secretKeyRef:
                      name: postgres-secret
                      key: POSTGRES_DB
                - name: POSTGRES_HOST
                  value: "postgres"
                - name: POSTGRES_PORT
                  value: "5432"
                - name: GCS_BUCKET
                  value: "dwk-gke-487216-todo-backups-eu-20260322-080541"
              volumeMounts:
                - name: gcs-credentials
                  mountPath: /var/secrets/google
                  readOnly: true
              script: |
                #!/bin/bash
                set -e

                # Setup timestamp for backup filename
                BACKUP_DATE=$(date +%Y-%m-%d_%H-%M-%S)
                BACKUP_FILE="postgres-backup-${BACKUP_DATE}.sql"

                echo "Starting database backup at $(date)"

                # Set GCS credentials
                export GOOGLE_APPLICATION_CREDENTIALS=/var/secrets/google/key.json

                # Create backup
                echo "Creating backup of ${POSTGRES_DB} database..."
                PGPASSWORD="${POSTGRES_PASSWORD}" pg_dump \
                  --host="${POSTGRES_HOST}" \
                  --port="${POSTGRES_PORT}" \
                  --username="${POSTGRES_USER}" \
                  --verbose \
                  "${POSTGRES_DB}" > "/tmp/${BACKUP_FILE}"

                if [ $? -eq 0 ]; then
                  echo "Backup file created successfully: ${BACKUP_FILE}"

                  # Compress the backup
                  echo "Compressing backup..."
                  gzip "/tmp/${BACKUP_FILE}"
                  BACKUP_FILE="${BACKUP_FILE}.gz"

                  # Upload to GCS
                  echo "Uploading backup to gs://${GCS_BUCKET}/${BACKUP_FILE}..."
                  gsutil cp "/tmp/${BACKUP_FILE}" "gs://${GCS_BUCKET}/${BACKUP_FILE}"

                  if [ $? -eq 0 ]; then
                    echo "Backup successfully uploaded to GCS"

                    # Optional: Keep only last 7 days of backups
                    echo "Cleaning up old backups (keeping last 7 days)..."
                    gsutil ls "gs://${GCS_BUCKET}/postgres-backup-" | while read -r file; do
                      FILE_DATE=$(basename "$file" | sed 's/postgres-backup-//;s/\.sql\.gz//')
                      FILE_EPOCH=$(date -d "$FILE_DATE" +%s 2>/dev/null || echo 0)
                      CUTOFF_EPOCH=$(date -d "7 days ago" +%s)

                      if [ "$FILE_EPOCH" -lt "$CUTOFF_EPOCH" ]; then
                        echo "Deleting old backup: $file"
                        gsutil rm "$file"
                      fi
                    done

                    # Cleanup local files
                    rm -f "/tmp/${BACKUP_FILE}"
                    echo "Backup completed successfully at $(date)"
                  else
                    echo "Failed to upload backup to GCS"
                    exit 1
                  fi
                else
                  echo "Failed to create backup"
                  exit 1
                fi
              resources:
                requests:
                  cpu: "100m"
                  memory: "256Mi"
                limits:
                  cpu: "500m"
                  memory: "512Mi"
          volumes:
            - name: gcs-credentials
              secret:
                secretName: gcs-credentials
                items:
                  - key: service-account-key.json
                    path: key.json
          restartPolicy: OnFailure
