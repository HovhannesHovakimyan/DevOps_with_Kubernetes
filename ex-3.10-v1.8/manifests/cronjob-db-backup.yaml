apiVersion: batch/v1
kind: CronJob
metadata:
  name: postgres-backup
  namespace: devops
spec:
  # Run daily at 2 AM UTC
  schedule: "0 2 * * *"
  jobTemplate:
    spec:
      backoffLimit: 3
      template:
        spec:
          serviceAccountName: backup-sa
          containers:
            - name: postgres-backup
              image: google/cloud-sdk:alpine
              env:
                - name: POSTGRES_USER
                  valueFrom:
                    secretKeyRef:
                      name: postgres-secret
                      key: POSTGRES_USER
                - name: POSTGRES_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: postgres-secret
                      key: POSTGRES_PASSWORD
                - name: POSTGRES_DB
                  valueFrom:
                    secretKeyRef:
                      name: postgres-secret
                      key: POSTGRES_DB
                - name: POSTGRES_HOST
                  value: "postgres"
                - name: POSTGRES_PORT
                  value: "5432"
                - name: GCS_BUCKET
                  value: "dwk-gke-487216-todo-backups-eu-20260322-080541"
              volumeMounts:
                - name: gcs-credentials
                  mountPath: /var/secrets/google
                  readOnly: true
              command:
                - /bin/sh
                - -c
              args:
                - |
                  set -e

                  apk add --no-cache postgresql-client > /dev/null 2>&1

                  BACKUP_DATE=$(date +%Y-%m-%d_%H-%M-%S)
                  BACKUP_FILE="postgres-backup-${BACKUP_DATE}.sql"

                  echo "Starting database backup at $(date)"

                  gcloud auth activate-service-account --key-file=/var/secrets/google/key.json > /dev/null
                  gcloud config set project dwk-gke-487216 > /dev/null

                  echo "Creating backup of ${POSTGRES_DB} database..."
                  PGPASSWORD="${POSTGRES_PASSWORD}" pg_dump \
                    --host="${POSTGRES_HOST}" \
                    --port="${POSTGRES_PORT}" \
                    --username="${POSTGRES_USER}" \
                    --verbose \
                    "${POSTGRES_DB}" > "/tmp/${BACKUP_FILE}"

                  echo "Backup file created successfully: ${BACKUP_FILE}"

                  echo "Compressing backup..."
                  gzip "/tmp/${BACKUP_FILE}"
                  BACKUP_FILE="${BACKUP_FILE}.gz"

                  echo "Uploading backup to gs://${GCS_BUCKET}/${BACKUP_FILE}..."
                  gsutil cp "/tmp/${BACKUP_FILE}" "gs://${GCS_BUCKET}/${BACKUP_FILE}"

                  echo "Backup successfully uploaded to GCS"

                  echo "Backup uploaded; skipping retention cleanup in this run"

                  rm -f "/tmp/${BACKUP_FILE}"
                  echo "Backup completed successfully at $(date)"
              resources:
                requests:
                  cpu: "100m"
                  memory: "256Mi"
                limits:
                  cpu: "500m"
                  memory: "512Mi"
          volumes:
            - name: gcs-credentials
              secret:
                secretName: gcs-credentials
                items:
                  - key: service-account-key.json
                    path: key.json
          restartPolicy: OnFailure
