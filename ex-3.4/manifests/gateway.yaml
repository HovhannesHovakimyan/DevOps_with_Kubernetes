apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: gke-gateway
  namespace: devops
spec:
  gatewayClassName: gke-l7-global-external-managed
  listeners:
    - name: http
      protocol: HTTP
      port: 80
      allowedRoutes:
        namespaces:
          from: Same
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: app-route
  namespace: devops
spec:
  parentRefs:
    - name: gke-gateway
  rules:
    # 1. The /status path (Static prefix)
    - matches:
        - path:
            type: PathPrefix
            value: /status
      backendRefs:
        - name: log-output-service
          port: 5000

    # 2. Ping-pong REWRITE (The Exercise Solution)
    - matches:
        - path:
            type: PathPrefix
            value: /pingpong
      filters:
        - type: URLRewrite
          urlRewrite:
            path:
              type: ReplacePrefixMatch
              replacePrefixMatch: /
      backendRefs:
        - name: ping-pong-service
          port: 5001
