name: Teardown application on branch delete

on:
  delete:
  workflow_dispatch:
    inputs:
      branch:
        description: "Branch name to teardown (optional for manual runs)"
        required: false
        default: ""

env:
  GKE_CLUSTER: dwk-cluster
  GKE_ZONE: me-west1
  DOMAIN: dwk-todo.app
  DNS_ZONE: dwk-todo-zone

jobs:
  teardown:
    name: Teardown namespace resources
    runs-on: ubuntu-latest
    environment: sirit
    env:
      PROJECT_ID: ${{ secrets.GKE_PROJECT }}
    if: github.event_name == 'workflow_dispatch' || github.event.ref_type == 'branch'

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - uses: google-github-actions/auth@v3
        with:
          credentials_json: ${{ secrets.GKE_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v3

      - name: Get GKE credentials
        uses: google-github-actions/get-gke-credentials@v3
        with:
          cluster_name: ${{ env.GKE_CLUSTER }}
          project_id: ${{ env.PROJECT_ID }}
          location: ${{ env.GKE_ZONE }}

      - name: Set up Kustomize
        uses: imranismail/setup-kustomize@v2.1.0

      - name: Delete all resources for deleted branch
        working-directory: ./ex-3.8-v1.7-extra
        shell: bash
        run: |-
          set -euo pipefail

          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" && -n "${{ github.event.inputs.branch }}" ]]; then
            branch_name="${{ github.event.inputs.branch }}"
          elif [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            branch_name="${{ github.ref_name }}"
          else
            branch_name="${{ github.event.ref }}"
          fi

          branch_name="${branch_name#refs/heads/}"

          if [[ -z "$branch_name" ]]; then
            echo "Could not determine branch name for teardown."
            exit 1
          fi

          if [[ "$branch_name" == "main" ]]; then
            target_namespace="devops"
            ingress_host="www.${DOMAIN}"
          else
            target_namespace="$branch_name"
            ingress_host="${branch_name}.${DOMAIN}"
          fi

          static_ip_name="todo-${target_namespace}-ip"
          fqdn="${ingress_host}."

          echo "Tearing down namespace: ${target_namespace}"
          echo "Removing DNS record: ${fqdn}"
          echo "Releasing global static IP: ${static_ip_name}"

          printf 'HOST=%s\nSTATIC_IP=%s\n' "${ingress_host}" "${static_ip_name}" > manifests/ingress-vars.env
          sed -i "s|^  name: .*|  name: ${target_namespace}|" manifests/namespace.yaml
          kustomize edit set namespace "$target_namespace"
          kustomize build . | kubectl delete --ignore-not-found=true -f -
          kubectl delete namespace "$target_namespace" --ignore-not-found=true --wait=false

          if gcloud dns managed-zones describe "${DNS_ZONE}" --quiet >/dev/null 2>&1; then
            if gcloud dns record-sets describe "${fqdn}" --zone="${DNS_ZONE}" --type=A --quiet >/dev/null 2>&1; then
              gcloud dns record-sets delete "${fqdn}" \
                --zone="${DNS_ZONE}" \
                --type=A \
                --quiet
            else
              echo "DNS A record ${fqdn} not found in zone ${DNS_ZONE}."
            fi
          else
            echo "Managed zone ${DNS_ZONE} not found. Skipping DNS cleanup."
          fi

          if gcloud compute addresses describe "${static_ip_name}" --global --quiet >/dev/null 2>&1; then
            for attempt in {1..12}; do
              if gcloud compute addresses delete "${static_ip_name}" --global --quiet; then
                echo "Deleted global static IP: ${static_ip_name}"
                break
              fi

              if [[ "$attempt" -eq 12 ]]; then
                echo "Static IP ${static_ip_name} still in use after waiting for ingress cleanup."
                exit 1
              fi

              echo "Static IP ${static_ip_name} still attached. Waiting 10 seconds before retry ${attempt}/12..."
              sleep 10
            done
          else
            echo "Global static IP ${static_ip_name} not found."
          fi

          echo "Teardown completed for namespace: ${target_namespace}"
