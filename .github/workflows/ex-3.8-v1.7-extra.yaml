name: Release application

on:
  push:
    paths:
      - "ex-3.8-v1.7-extra/**"
      - ".github/workflows/ex-3.8-v1.7-extra.yaml"

env:
  GKE_CLUSTER: dwk-cluster
  GKE_ZONE: me-west1
  REGISTRY: me-west1-docker.pkg.dev
  REPOSITORY: my-repository
  IMAGE_BASE: k8sproject
  WORKFLOW_FILE: .github/workflows/ex-3.8-v1.7-extra.yaml
  DOMAIN: dwk-todo.app
  # Cloud DNS managed zone name (gcloud dns managed-zones describe <zone>)
  DNS_ZONE: dwk-todo-zone

jobs:
  detect-context:
    name: Detect Build Context
    runs-on: ubuntu-latest
    environment: sirit
    if: github.event_name == 'push'
    env:
      PROJECT_ID: ${{ secrets.GKE_PROJECT }}
    outputs:
      app_folder: ${{ steps.detect.outputs.app_folder }}
      component_matrix: ${{ steps.detect.outputs.component_matrix }}
      target_namespace: ${{ steps.detect.outputs.target_namespace }}
      image_tag_suffix: ${{ steps.detect.outputs.image_tag_suffix }}
      ingress_host: ${{ steps.detect.outputs.ingress_host }}
      apex_host: ${{ steps.detect.outputs.apex_host }}
      static_ip_name: ${{ steps.detect.outputs.static_ip_name }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Detect app folder from changed files
        id: detect
        shell: bash
        run: |
          set -euo pipefail

          registry="${REGISTRY%/}"
          project_id="${PROJECT_ID#/}"
          project_id="${project_id%/}"
          repository="${REPOSITORY#/}"
          repository="${repository%/}"

          if [[ -z "$project_id" ]]; then
            echo "GKE_PROJECT is empty in detect-context."
            echo "An empty project id produces invalid tags like: ${registry}//${repository}/..."
            echo "Make sure the 'sirit' environment exposes the GKE_PROJECT secret to this workflow."
            exit 1
          fi

          if [[ -z "$registry" || -z "$repository" || -z "$IMAGE_BASE" ]]; then
            echo "Registry, repository, and image base must be non-empty."
            exit 1
          fi

          if [[ "$project_id" == */* ]]; then
            echo "GKE_PROJECT must be only the GCP project id (no slashes). Got: $project_id"
            exit 1
          fi

          # Handle new branches where github.event.before is null
          if [[ "${{ github.event.before }}" == "0000000000000000000000000000000000000000" || -z "${{ github.event.before }}" ]]; then
            diff_base="origin/main"
          else
            diff_base="${{ github.event.before }}"
          fi

          app_folder="$(git diff --name-only "${diff_base}" "${{ github.sha }}" | awk -F/ '/^ex-[^/]+\// {print $1; exit}')"
          if [[ -z "$app_folder" ]]; then
            if git diff --name-only "${diff_base}" "${{ github.sha }}" | grep -Fxq "$WORKFLOW_FILE"; then
              app_folder="$(basename "$WORKFLOW_FILE" .yaml)"
            else
              echo "No changed ex-* folder detected from push diff."
              echo "Ensure this workflow is triggered by changes under an ex-* directory or by updating $WORKFLOW_FILE."
              exit 1
            fi
          fi

          if [[ "${GITHUB_REF_NAME}" == "main" ]]; then
            target_namespace="devops"
            ingress_host="www.${DOMAIN}"
            apex_host="${DOMAIN}"
          else
            branch_slug="$(printf '%s' "${GITHUB_REF_NAME}" \
              | tr '[:upper:]' '[:lower:]' \
              | sed -E 's|^refs/heads/||; s|[^a-z0-9]+|-|g; s|^-+||; s|-+$||; s|-{2,}|-|g')"
            branch_slug="${branch_slug:0:55}"
            branch_slug="${branch_slug%-}"

            if [[ -z "$branch_slug" ]]; then
              echo "Branch name '${GITHUB_REF_NAME}' cannot be converted into a valid namespace/DNS label."
              exit 1
            fi

            target_namespace="$branch_slug"
            ingress_host="${branch_slug}.${DOMAIN}"
            apex_host="${ingress_host}"
          fi

          # Named global static IP: pre-create with:
          #   gcloud compute addresses create todo-${target_namespace}-ip --global
          static_ip_name="todo-${target_namespace}-ip"

          image_tag_suffix="${app_folder}-${target_namespace}-${GITHUB_SHA::12}"

          echo "ingress_host=$ingress_host" >> "$GITHUB_OUTPUT"
          echo "apex_host=$apex_host" >> "$GITHUB_OUTPUT"
          echo "static_ip_name=$static_ip_name" >> "$GITHUB_OUTPUT"

          component_matrix="$(jq -cn \
            --arg image_base "$IMAGE_BASE" \
            '{include: [
              {
                component: "backend",
                image_name: ($image_base + "-backend"),
                kustomize_image_key: "BACKEND_IMAGE"
              },
              {
                component: "frontend",
                image_name: ($image_base + "-frontend"),
                kustomize_image_key: "FRONTEND_IMAGE"
              }
            ]}')"

          echo "app_folder=$app_folder" >> "$GITHUB_OUTPUT"
          echo "component_matrix=$component_matrix" >> "$GITHUB_OUTPUT"
          echo "target_namespace=$target_namespace" >> "$GITHUB_OUTPUT"
          echo "image_tag_suffix=$image_tag_suffix" >> "$GITHUB_OUTPUT"

  build-and-push:
    name: Build and Push (${{ matrix.component }})
    runs-on: ubuntu-latest
    environment: sirit
    if: github.event_name == 'push'
    env:
      PROJECT_ID: ${{ secrets.GKE_PROJECT }}
    needs: detect-context
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.detect-context.outputs.component_matrix) }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Debug GKE_SA_KEY length
        shell: bash
        run: |
          echo "Length of GKE_SA_KEY: $(echo '${{ secrets.GKE_SA_KEY }}' | wc -c)"

      - uses: google-github-actions/auth@v3
        with:
          credentials_json: ${{ secrets.GKE_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v3

      - name: Use gcloud CLI
        run: gcloud info

      - name: Verify active identity
        run: gcloud auth list --filter=status:ACTIVE --format="value(account)"

      - name: Configure Docker auth for Artifact Registry
        run: gcloud --quiet auth configure-docker ${{ env.REGISTRY }}

      - name: Get GKE credentials
        uses: google-github-actions/get-gke-credentials@v3
        with:
          cluster_name: ${{ env.GKE_CLUSTER }}
          project_id: ${{ env.PROJECT_ID }}
          location: ${{ env.GKE_ZONE }}

      - name: Build and Publish Image
        shell: bash
        run: |
          set -euo pipefail
          app_folder="${{ needs.detect-context.outputs.app_folder }}"
          image_tag="${REGISTRY%/}/${PROJECT_ID}/${REPOSITORY}/${IMAGE_BASE}-${{ matrix.component }}:${{ needs.detect-context.outputs.image_tag_suffix }}"

          if [[ "$image_tag" == *"//"* ]]; then
            echo "Generated image tag contains a double slash: $image_tag"
            exit 1
          fi

          docker build --tag "$image_tag" "./$app_folder/${{ matrix.component }}"
          docker push "$image_tag"

  deploy:
    name: Deploy application
    runs-on: ubuntu-latest
    environment: sirit
    if: github.event_name == 'push'
    env:
      PROJECT_ID: ${{ secrets.GKE_PROJECT }}
    needs:
      - build-and-push
      - detect-context

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Debug GKE_SA_KEY length
        shell: bash
        run: |
          echo "Length of GKE_SA_KEY: $(echo '${{ secrets.GKE_SA_KEY }}' | wc -c)"

      - uses: google-github-actions/auth@v3
        with:
          credentials_json: ${{ secrets.GKE_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v3

      - name: Use gcloud CLI
        run: gcloud info

      - name: Verify active identity
        run: gcloud auth list --filter=status:ACTIVE --format="value(account)"

      - name: Configure Docker auth for Artifact Registry
        run: gcloud --quiet auth configure-docker ${{ env.REGISTRY }}

      - name: Get GKE credentials
        uses: google-github-actions/get-gke-credentials@v3
        with:
          cluster_name: ${{ env.GKE_CLUSTER }}
          project_id: ${{ env.PROJECT_ID }}
          location: ${{ env.GKE_ZONE }}

      - name: Set up Kustomize
        uses: imranismail/setup-kustomize@v2.1.0

      - name: Deploy backend and frontend
        working-directory: ./${{ needs.detect-context.outputs.app_folder }}
        shell: bash
        run: |-
          set -euo pipefail
          target_namespace="${{ needs.detect-context.outputs.target_namespace }}"
          ingress_host="${{ needs.detect-context.outputs.ingress_host }}"
          static_ip_name="${{ needs.detect-context.outputs.static_ip_name }}"
          backend_image_tag="${REGISTRY%/}/${PROJECT_ID}/${REPOSITORY}/${IMAGE_BASE}-backend:${{ needs.detect-context.outputs.image_tag_suffix }}"
          frontend_image_tag="${REGISTRY%/}/${PROJECT_ID}/${REPOSITORY}/${IMAGE_BASE}-frontend:${{ needs.detect-context.outputs.image_tag_suffix }}"

          if [[ "$backend_image_tag" == *"//"* || "$frontend_image_tag" == *"//"* ]]; then
            echo "Generated image tag contains a double slash."
            echo "Backend tag: $backend_image_tag"
            echo "Frontend tag: $frontend_image_tag"
            exit 1
          fi

          # Fail fast if either image was not pushed successfully.
          gcloud artifacts docker images describe "$backend_image_tag"
          gcloud artifacts docker images describe "$frontend_image_tag"

          # Ensure the global static IP for this namespace exists (idempotent).
          if ! gcloud compute addresses describe "${static_ip_name}" --global --quiet 2>/dev/null; then
            echo "Creating global static IP: ${static_ip_name}"
            gcloud compute addresses create "${static_ip_name}" --global
          fi

          sed -i "s/^  name: .*/  name: ${target_namespace}/" manifests/namespace.yaml
          kustomize edit set namespace "$target_namespace"

          # Feed ingress runtime values to kustomize replacements.
          apex_host="${{ needs.detect-context.outputs.apex_host }}"
          printf 'HOST=%s\nSTATIC_IP=%s\nAPEX_HOST=%s\n' "${ingress_host}" "${static_ip_name}" "${apex_host}" > manifests/ingress-vars.env

          kustomize edit set image "BACKEND_IMAGE=$backend_image_tag"
          kustomize edit set image "FRONTEND_IMAGE=$frontend_image_tag"
          kustomize build . | kubectl apply -f -
          kubectl rollout status deployment todo-backend -n "$target_namespace"
          kubectl rollout status deployment todo-frontend -n "$target_namespace"
          kubectl get services -n "$target_namespace" -o wide

      - name: Ensure Cloud DNS zone exists
        shell: bash
        run: |
          set -euo pipefail

          if ! gcloud dns managed-zones describe "${DNS_ZONE}" --quiet >/dev/null 2>&1; then
            echo "Creating Cloud DNS zone ${DNS_ZONE} for ${DOMAIN}..."
            gcloud dns managed-zones create "${DNS_ZONE}" \
              --dns-name="${DOMAIN}." \
              --description="Managed by GitHub Actions"
            echo "Zone ${DNS_ZONE} created."
          else
            echo "Cloud DNS zone ${DNS_ZONE} already exists."
          fi

          echo "Authoritative nameservers for ${DNS_ZONE}:"
          gcloud dns managed-zones describe "${DNS_ZONE}" --format='value(nameServers[])'
          echo "NOTE: Domain registration is managed manually. Ensure your registrar delegates ${DOMAIN} to the nameservers above."

      - name: Upsert Cloud DNS A record
        shell: bash
        run: |
          set -euo pipefail
          ingress_host="${{ needs.detect-context.outputs.ingress_host }}"
          static_ip_name="${{ needs.detect-context.outputs.static_ip_name }}"

          # Zone is ensured by the preceding step.
          # Domain delegation must be configured once at the registrar.

          ingress_ip="$(gcloud compute addresses describe "${static_ip_name}" --global --format='value(address)')"
          echo "${static_ip_name} → ${ingress_ip}"

          upsert_dns_record() {
            local host="$1" ip="$2"
            local fqdn="${host}."
            if gcloud dns record-sets describe "${fqdn}" --zone="${DNS_ZONE}" --type=A --quiet 2>/dev/null; then
              gcloud dns record-sets update "${fqdn}" \
                --zone="${DNS_ZONE}" --type=A --ttl=300 --rrdatas="${ip}"
            else
              gcloud dns record-sets create "${fqdn}" \
                --zone="${DNS_ZONE}" --type=A --ttl=300 --rrdatas="${ip}"
            fi
            echo "DNS A record set: ${host} → ${ip}"
          }

          upsert_dns_record "${ingress_host}" "${ingress_ip}"

          # Also point the apex domain at the same IP (only differs on main).
          apex_host="${{ needs.detect-context.outputs.apex_host }}"
          if [[ "${apex_host}" != "${ingress_host}" ]]; then
            upsert_dns_record "${apex_host}" "${ingress_ip}"
          fi
