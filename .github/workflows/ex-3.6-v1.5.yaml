name: Release application

on:
  push:
    paths:
      - "ex-3.6-v1.5/**"

env:
  PROJECT_ID: ${{ secrets.GKE_PROJECT }}
  GKE_CLUSTER: dwk-cluster
  GKE_ZONE: me-west1
  REGISTRY: me-west1-docker.pkg.dev
  REPOSITORY: my-repository
  IMAGE: dwk-environments
  BRANCH: ${{ github.ref_name }}

jobs:
  build-and-push:
    name: Build and Push (${{ matrix.component }})
    runs-on: ubuntu-latest
    environment: sirit
    strategy:
      fail-fast: false
      matrix:
        include:
          - component: backend
            component_upper: BACKEND
          - component: frontend
            component_upper: FRONTEND

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Debug GKE_SA_KEY length
        shell: bash
        run: |
          echo "Length of GKE_SA_KEY: $(echo '${{ secrets.GKE_SA_KEY }}' | wc -c)"

      - uses: google-github-actions/auth@v3
        with:
          credentials_json: ${{ secrets.GKE_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v3

      - name: Use gcloud CLI
        run: gcloud info

      - run: gcloud --quiet auth configure-docker

      - name: Get GKE credentials
        uses: google-github-actions/get-gke-credentials@v3
        with:
          cluster_name: ${{ env.GKE_CLUSTER }}
          project_id: ${{ env.PROJECT_ID }}
          location: ${{ env.GKE_ZONE }}

      - name: Build and Publish Image
        shell: bash
        run: |
          set -euo pipefail
          image_tag="$REGISTRY/$PROJECT_ID/$REPOSITORY/$IMAGE:$BRANCH-${{ matrix.component_upper }}-$GITHUB_SHA"
          docker build --tag "$image_tag" "./ex-3.6-v1.5/${{ matrix.component }}"
          docker push "$image_tag"

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    environment: sirit
    needs: build-and-push

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Debug GKE_SA_KEY length
        shell: bash
        run: |
          echo "Length of GKE_SA_KEY: $(echo '${{ secrets.GKE_SA_KEY }}' | wc -c)"

      - uses: google-github-actions/auth@v3
        with:
          credentials_json: ${{ secrets.GKE_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v3

      - name: Use gcloud CLI
        run: gcloud info

      - run: gcloud --quiet auth configure-docker

      - name: Get GKE credentials
        uses: google-github-actions/get-gke-credentials@v3
        with:
          cluster_name: ${{ env.GKE_CLUSTER }}
          project_id: ${{ env.PROJECT_ID }}
          location: ${{ env.GKE_ZONE }}

      - name: Set up Kustomize
        uses: imranismail/setup-kustomize@v2.1.0

      - name: Deploy Backend and Frontend
        working-directory: ./ex-3.6-v1.5
        shell: bash
        run: |-
          set -euo pipefail
          backend_tag="$REGISTRY/$PROJECT_ID/$REPOSITORY/$IMAGE:$BRANCH-BACKEND-$GITHUB_SHA"
          frontend_tag="$REGISTRY/$PROJECT_ID/$REPOSITORY/$IMAGE:$BRANCH-FRONTEND-$GITHUB_SHA"
          kustomize edit set image \
            BACKEND_IMAGE=$backend_tag \
            FRONTEND_IMAGE=$frontend_tag
          kustomize build . | kubectl apply -f -
          kubectl rollout status deployment todo-backend -n devops
          kubectl rollout status deployment todo-frontend -n devops
          kubectl get services -n devops -o wide
