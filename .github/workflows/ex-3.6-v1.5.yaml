name: Release application

on:
  push:
    paths:
      - "ex-3.6-v1.5/**"

env:
  PROJECT_ID: ${{ secrets.GKE_PROJECT }}
  GKE_CLUSTER: dwk-cluster
  GKE_ZONE: me-west1
  REGISTRY: me-west1-docker.pkg.dev
  REPOSITORY: my-repository
  IMAGE_BASE: k8sproject

jobs:
  detect-context:
    name: Detect Build Context
    runs-on: ubuntu-latest
    outputs:
      app_folder: ${{ steps.detect.outputs.app_folder }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Detect app folder from changed files
        id: detect
        shell: bash
        run: |
          set -euo pipefail
          app_folder="$(git diff --name-only "${{ github.event.before }}" "${{ github.sha }}" | awk -F/ '/^ex-[^/]+\// {print $1; exit}')"
          if [[ -z "$app_folder" ]]; then
            echo "No changed ex-* folder detected from push diff."
            echo "Ensure this workflow is triggered by changes under an ex-* directory."
            exit 1
          fi
          echo "app_folder=$app_folder" >> "$GITHUB_OUTPUT"

  build-and-push:
    name: Build and Push (${{ matrix.component }})
    runs-on: ubuntu-latest
    environment: sirit
    needs: detect-context
    strategy:
      fail-fast: false
      matrix:
        include:
          - component: backend
            image_name: k8sproject-backend
          - component: frontend
            image_name: k8sproject-frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Debug GKE_SA_KEY length
        shell: bash
        run: |
          echo "Length of GKE_SA_KEY: $(echo '${{ secrets.GKE_SA_KEY }}' | wc -c)"

      - uses: google-github-actions/auth@v3
        with:
          credentials_json: ${{ secrets.GKE_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v3

      - name: Use gcloud CLI
        run: gcloud info

      - name: Verify active identity
        run: gcloud auth list --filter=status:ACTIVE --format="value(account)"

      - name: Configure Docker auth for Artifact Registry
        run: gcloud --quiet auth configure-docker ${{ env.REGISTRY }}

      - name: Get GKE credentials
        uses: google-github-actions/get-gke-credentials@v3
        with:
          cluster_name: ${{ env.GKE_CLUSTER }}
          project_id: ${{ env.PROJECT_ID }}
          location: ${{ env.GKE_ZONE }}

      - name: Build and Publish Image
        shell: bash
        run: |
          set -euo pipefail
          app_folder="${{ needs.detect-context.outputs.app_folder }}"
          image_tag="$REGISTRY/$PROJECT_ID/$REPOSITORY/${{ matrix.image_name }}:$app_folder"
          docker build --tag "$image_tag" "./$app_folder/${{ matrix.component }}"
          docker push "$image_tag"

  deploy:
    name: Deploy (${{ matrix.component }})
    runs-on: ubuntu-latest
    environment: sirit
    needs:
      - build-and-push
      - detect-context
    strategy:
      fail-fast: false
      matrix:
        include:
          - component: backend
            image_name: k8sproject-backend
          - component: frontend
            image_name: k8sproject-frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Debug GKE_SA_KEY length
        shell: bash
        run: |
          echo "Length of GKE_SA_KEY: $(echo '${{ secrets.GKE_SA_KEY }}' | wc -c)"

      - uses: google-github-actions/auth@v3
        with:
          credentials_json: ${{ secrets.GKE_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v3

      - name: Use gcloud CLI
        run: gcloud info

      - name: Verify active identity
        run: gcloud auth list --filter=status:ACTIVE --format="value(account)"

      - name: Configure Docker auth for Artifact Registry
        run: gcloud --quiet auth configure-docker ${{ env.REGISTRY }}

      - name: Get GKE credentials
        uses: google-github-actions/get-gke-credentials@v3
        with:
          cluster_name: ${{ env.GKE_CLUSTER }}
          project_id: ${{ env.PROJECT_ID }}
          location: ${{ env.GKE_ZONE }}

      - name: Set up Kustomize
        uses: imranismail/setup-kustomize@v2.1.0

      - name: Deploy ${{ matrix.component }}
        working-directory: ./${{ needs.detect-context.outputs.app_folder }}
        shell: bash
        run: |-
          set -euo pipefail
          app_folder="${{ needs.detect-context.outputs.app_folder }}"
          component="${{ matrix.component }}"
          image_tag="$REGISTRY/$PROJECT_ID/$REPOSITORY/${{ matrix.image_name }}:$app_folder"
          kustomize edit set image "${component^^}_IMAGE=$image_tag"
          kustomize build . | kubectl apply -f -
          kubectl rollout status deployment todo-$component -n devops
          kubectl get services -n devops -o wide
